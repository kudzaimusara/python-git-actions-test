name: Update Image Tag

on:
  pull_request:
    branches:
      - main

jobs:
  update-image-tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest git tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tags found in this branch — skipping update"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update image tag in image.yaml
        run: |
          sed -i 's|^\(  tag: \).*|\1"${{ steps.get_tag.outputs.tag }}"|' image.yaml

      - name: Commit and push updated image.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add image.yaml
          git diff --staged --quiet || git commit -m "chore: update image tag to ${{ steps.get_tag.outputs.tag }}"
          git push origin ${{ github.head_ref }}
