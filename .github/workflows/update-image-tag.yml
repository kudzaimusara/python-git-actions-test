name: Update Image Tag

on:
  pull_request:
    branches:
      - main

jobs:
  update-image-tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: test
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag name
        id: get_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Update image tag in image.yaml
        run: |
          sed -i 's/^\(  tag: \).*/\1"${{ steps.get_tag.outputs.tag }}"/' image.yaml

      - name: Commit and push updated image.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add image.yaml
          git commit -m "chore: update image tag to ${{ steps.get_tag.outputs.tag }}"
          git push origin main
